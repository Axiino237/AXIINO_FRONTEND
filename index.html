<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Charset & Viewport -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Title & Description -->
  <title>Axiino | Building Future-Ready Web, Mobile & AI Solutions</title>
  <meta name="description"
    content="Axiino is a technology-first company delivering scalable, intelligent, and beautifully designed solutions across web, mobile, and AI platforms." />

  <!-- Keywords for SEO -->
  <meta name="keywords"
    content="Axiino, Web Development, Mobile App Development, AI Solutions, React, Node.js, React Native, Tech Company, Software Development, Custom Apps, Digital Transformation" />

  <!-- Author -->
  <meta name="author" content="Axiino Technologies" />

  <!-- Favicon -->
  <link rel="icon" href="/src/assets/logo.png" type="image/x-icon" />
  <link rel="apple-touch-icon" href="/src/assets/logo.png" />
  <meta name="theme-color" content="#0f172a" />

  <!-- Open Graph (for social media preview) -->
  <meta property="og:title" content="Axiino | Future-Ready Web, Mobile & AI Solutions" />
  <meta property="og:description"
    content="We help businesses scale with intelligent software — from web and mobile apps to AI-driven platforms." />
  <meta property="og:image" content="/src/assets/logo.png" />
  <meta property="og:url" content="https://axiino.com" />
  <meta property="og:type" content="website" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Axiino | Web, Mobile & AI Development" />
  <meta name="twitter:description" content="Scalable and beautiful tech solutions that empower your business." />
  <meta name="twitter:image" content="/src/assets/logo.png" />

  <!-- Canonical -->
  <link rel="canonical" href="https://axiino.com" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tailwind Custom Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            outfit: ['Outfit', 'sans-serif'],
          },
          colors: {
            axiino: '#0f172a',
          },
        },
      },
    };
  </script>

  <!-- Google Font (optional) -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet" />
</head>
